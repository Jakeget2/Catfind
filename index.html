<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catholic Mass Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⛪ Catholic Mass Finder</h1>
            <p>Find Mass times, Confession, and Adoration in your area</p>
        </header>

        <!-- Navigation Menu -->
        <div class="navigation-menu">
            <h2>What would you like to find?</h2>
            <div class="menu-buttons">
                <a href="mass.html" class="menu-button">📿 Find My Mass</a>
                <a href="adoration.html" class="menu-button">🕯️ Find Adoration</a>
                <a href="confession.html" class="menu-button">✝️ Find Confession</a>
            </div>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="zipCode" 
                placeholder="Enter your zip code" 
                maxlength="5"
            >
            <button onclick="searchMass()">Search</button>
        </div>

        <div id="results" class="results-section"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
