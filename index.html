<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catholic Mass Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body><script>
    // Dark Mode Toggle
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        updateToggleButton();
    }

    function updateToggleButton() {
        const toggle = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            toggle.textContent = '☀️';
        } else {
            toggle.textContent = '🌙';
        }
    }

    // Load dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        updateToggleButton();
    }
</script>
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
    <div class="container">
        <header>
            <h1>⛪ Catholic Finder</h1>
            <p>Find Mass, Learn About Faith</p>
        </header>

        <div class="navigation-menu">
            <div class="menu-buttons">
                <a href="https://www.masstimes.org/" class="menu-button" target="_blank">
                    🔍 Find a Church
                </a>
                <a href="prayers.html" class="menu-button">
    🙏 Pray
</a>
               <a href="eucharistic-miracles.html" class="menu-button">
    ✨ Eucharistic Miracles
</a>
            </div>
        </div>

        <div class="verse-section">
            <h2>📖 Verse of the Day</h2>
            <p id="verse-text" style="font-size: 1.2rem; font-style: italic; color: #1a472a; line-height: 1.8;">Loading...</p>
            <button onclick="getNewVerse()" class="verse-button">Get Another Verse</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Display verse on page load
        document.addEventListener('DOMContentLoaded', function() {
            getNewVerse();
        });

        function getNewVerse() {
            const verses = [
                "For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future. - Jeremiah 29:11",
                "Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight. - Proverbs 3:5-6",
                "The Lord is my shepherd, I lack nothing. - Psalm 23:1",
                "Jesus answered, 'I am the way and the truth and the life. No one comes to the Father except through me.' - John 14:6",
                "For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life. - John 3:16",
                "Come to me, all you who are weary and burdened, and I will give you rest. - Matthew 11:28"
            ];
            const randomVerse = verses[Math.floor(Math.random() * verses.length)];
            document.getElementById('verse-text').innerText = randomVerse;
        }
    </script>
</body>
</html>
